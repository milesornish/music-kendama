; dual-cdc-test — de-risk the receiver's dual USB-CDC design (architecture §5).
; Goal: have ONE ESP32-S3 enumerate as TWO /dev/tty.usbmodem* ports
;       (Port A upstream / Port B downstream).
;
; Requires the USB-OTG / TinyUSB stack (ARDUINO_USB_MODE=0), NOT the hardware
; USB-Serial/JTAG peripheral (=1), which can only expose a single fixed CDC port.
; The crux is getting TinyUSB to build with 2 CDC interfaces (CFG_TUD_CDC=2).
[env:dual_cdc_test]
platform = espressif32
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0   ; manage both CDC instances ourselves
    -DARDUINO_USB_MODE=0          ; USB-OTG / TinyUSB (required for composite/multi-CDC)
    -DCFG_TUD_CDC=2               ; attempt 2 CDC interfaces (the de-risk)
