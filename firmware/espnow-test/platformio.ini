; espnow-test — validate the §4 ESP-NOW wireless link between two real S3 boards.
; One sketch, two role envs (mirrors the architecture's "identical firmware + role flag").
;   sender   -> board #1 (B4:3A:45:33:B9:70): sends a counter packet every 500 ms
;   receiver -> board #2 (B4:3A:45:34:0D:20): prints received packets + loss count
[env]
platform = espressif32
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[env:sender]
build_flags =
    ${env.build_flags}
    -DROLE_SENDER
lib_deps =
    adafruit/Adafruit LSM6DS   ; provides Adafruit_ISM330DHCX (+ pulls BusIO, Unified Sensor)

[env:receiver]
build_flags =
    ${env.build_flags}
    -DROLE_RECEIVER
