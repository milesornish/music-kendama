; battery-check — read the ESP32-S3 Feather's onboard MAX17048 LiPo fuel gauge.
; Standalone diagnostic: no radio, no LEDs, so it also lets the cell charge fastest.
[env:battery]
platform = espressif32
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    adafruit/Adafruit MAX1704X
