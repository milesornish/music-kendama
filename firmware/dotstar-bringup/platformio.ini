; dotstar-bringup — standalone APA102 DotStar signs-of-life test.
; No ESP-NOW, no IMU: just animates the strip so we can prove the DotStar wiring
; + firmware in isolation before folding it back into the OSC chain.
; Hardware SPI: strip DI -> Feather MO (MOSI), strip CI -> Feather SCK.
[env:dotstar]
platform = espressif32
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    adafruit/Adafruit DotStar
