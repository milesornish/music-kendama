; espnow-latency — round-trip timing for the ESP-NOW link (no LEDs, no IMU).
; Self-roling by MAC: PINGER stamps + sends, ECHO bounces it straight back, PINGER
; measures RTT and estimates one-way as RTT/2. Needs only two boards + one USB cable
; (the PINGER's) to read the stats. Pure firmware — nothing to solder.
[env:node]
platform = espressif32
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -I${PROJECT_DIR}/../shared
