; bringup — toolchain + flash + serial sanity check, and MAC-address capture.
; Throwaway de-risk firmware: proves a machine can build/flash/monitor an
; ESP32-S3 Feather, and prints the STA MAC needed for ESP-NOW peering (secrets.h).
[env:bringup]
platform = espressif32
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
