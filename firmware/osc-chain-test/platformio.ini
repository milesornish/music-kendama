; osc-chain-test — end-to-end OSC signal chain on real hardware.
;   instruments (B9:70 -> tama, 0D:80 -> ken): IMU -> kendama_sensor_t over ESP-NOW.
;   Receiver-UP (0D:20): wraps each packet as OSC (shared/osc.h) + SLIP (shared/slip.h)
;                        and writes PURE BINARY to USB serial (Port A) for the C bridge.
; Self-roling by MAC; uses firmware/shared via the include path below.
[env:node]
platform = espressif32
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -I${PROJECT_DIR}/../shared
lib_deps =
    adafruit/Adafruit LSM6DS
    adafruit/Adafruit DotStar

; Diagnostic build: RX_UP counts ESP-NOW receptions (light callback) and emits a 1 Hz
; /kendama/rxstat instead of forwarding each packet — isolates air RX vs serial-write.
[env:rxcount]
extends = env:node
build_flags = ${env:node.build_flags} -DRX_COUNT_MODE

; Diagnostic build: instrument sends its uplink as ESP-NOW BROADCAST (no ACK) to test
; whether the ~700/s ceiling is unicast-ACK-bound.
[env:bcast]
extends = env:node
build_flags = ${env:node.build_flags} -DESPNOW_BROADCAST

; Diagnostic build: instrument packs 5 IMU samples per ESP-NOW frame (unicast) to test
; whether batching beats the per-packet ceiling. Pairs with the rxcount receiver.
[env:batch]
extends = env:node
build_flags = ${env:node.build_flags} -DBATCH_N=5

; Diagnostic build: raise the ESP-NOW TX PHY rate (default ~1 Mbps) to 54 Mbps to cut
; per-byte airtime and move the packet ceiling. Single-sample, unicast.
[env:phy]
extends = env:node
build_flags = ${env:node.build_flags} -DESPNOW_PHY_RATE=WIFI_PHY_RATE_54M

; Diagnostic build: both levers at once — 5 samples/frame AND 54 Mbps PHY.
[env:batchphy]
extends = env:node
build_flags = ${env:node.build_flags} -DBATCH_N=5 -DESPNOW_PHY_RATE=WIFI_PHY_RATE_54M
