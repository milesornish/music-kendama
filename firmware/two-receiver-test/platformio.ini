; two-receiver-test — validate the TWO-receiver topology (split by direction).
; ONE identical binary for all boards; each self-assigns its role by its own MAC
; at boot, so USB port numbers (which shuffle across resets / the display hub)
; never have to match a role. Mirrors the architecture's "identical firmware + role".
;   B4:3A:45:33:B9:70 (board #1) -> INSTRUMENT: IMU -> ESP-NOW -> Receiver-UP; Rx cmds.
;   B4:3A:45:34:0D:20 (board #2) -> RECEIVER-UP: Rx sensor -> CDC (Port A, upstream).
;   B4:3A:45:34:0C:E0 (board #3) -> RECEIVER-DOWN: CDC line (Port B) -> ESP-NOW -> instrument.
[env:node]
platform = espressif32
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    adafruit/Adafruit LSM6DS
